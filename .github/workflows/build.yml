name: "FAP Build"

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  check-api:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Check SDK Version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Not a scheduled run. Building."
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          LATEST_FW=$(curl -s https://update.flipperzero.one/firmware/directory.json | jq -r '.channels[] | select(.id=="release") | .versions[0].version')
          
          LAST_FW="none"
          if gh release view latest --repo ${{ github.repository }} > /dev/null 2>&1; then
            LAST_FW=$(gh release view latest --repo ${{ github.repository }} --json body -q .body | grep -oP '(?<=FW: ).*' || echo "none")
          fi
          
          echo "Latest Official FW: $LATEST_FW"
          echo "Last Built FW: $LAST_FW"
          
          if [ "$LATEST_FW" == "$LAST_FW" ]; then
            echo "Firmware hasn't changed. Skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New firmware detected. Building."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-api
    if: needs.check-api.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build FAP
        uses: flipperdevices/flipperzero-ufbt-action@v0.1.3
        id: build-app
        with:
          task: build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: baofeng_programmer_fap
          path: dist/*.fap

      - name: Fetch Flipper Firmware Version
        id: fw
        run: |
          LATEST_FW=$(curl -s https://update.flipperzero.one/firmware/directory.json | jq -r '.channels[] | select(.id=="release") | .versions[0].version')
          echo "version=$LATEST_FW" >> $GITHUB_OUTPUT

      - name: Release
        uses: ncipollo/release-action@v1
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag: "latest"
          name: "Latest Build"
          body: "Auto-compiled FAP. FW: ${{ steps.fw.outputs.version }} (API: ${{ steps.build-app.outputs.api-version }})"
          artifacts: "dist/*.fap"
          allowUpdates: true
          makeLatest: true
          prerelease: true
